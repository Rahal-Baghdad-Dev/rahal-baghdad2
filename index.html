<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رحال لخطوط النقل</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-400 font-sans">
    <header class="bg-black text-white p-5 shadow-lg text-center">
        <h1 class="text-3xl font-bold italic">رَحّال 🚕</h1>
        <p class="text-sm">لخطوط النقل والركاب</p>
    </header>

    <main class="p-6 flex flex-col items-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-b-8 border-black">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">وين تريد تروح اليوم؟</h2>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" placeholder="موقع الانطلاق (مثلاً: المنصور)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none border-2 border-transparent focus:border-yellow-500 transition-all">
                </div>
                <div class="relative">
                    <input type="text" placeholder="وجهتك (مثلاً: الكرادة)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none border-2 border-transparent focus:border-yellow-500 transition-all">
                </div>
                
                <button class="w-full bg-black text-white font-bold py-5 rounded-2xl hover:bg-zinc-800 transition-all text-xl shadow-lg active:scale-95">
                    البحث عن رحلة
                </button>
            </div>

            <div class="mt-8 flex justify-around border-t pt-6">
                <div class="text-center opacity-50 hover:opacity-100 cursor-pointer">
                    <span class="text-3xl">🚌</span>
                    <p class="text-xs font-bold">باص</p>
                </div>
                <div class="text-center">
                    <span class="text-3xl">🚕</span>
                    <p class="text-xs font-bold">تكسي</p>
                </div>
                <div class="text-center opacity-50 hover:opacity-100 cursor-pointer">
                    <span class="text-3xl">🏍️</span>
                    <p class="text-xs font-bold">تكتك</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-black text-white p-3 text-center text-xs">
        شركة رحال لخدمات النقل الذكي - بغداد ٢٠٢٦
    </footer>
</body>
</html>
